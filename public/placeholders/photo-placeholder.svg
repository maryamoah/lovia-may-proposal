<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 2100" role="img" aria-labelledby="title desc">
  <title id="title">Photo placeholder</title>
  <desc id="desc">A warm cinematic placeholder for a missing romantic photograph.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#050403"/><stop offset="0.55" stop-color="#1b120e"/><stop offset="1" stop-color="#5b4432"/></linearGradient>
    <radialGradient id="glow" cx="35%" cy="28%" r="60%"><stop stop-color="#b9985b" stop-opacity="0.38"/><stop offset="1" stop-color="#b9985b" stop-opacity="0"/></radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 0.12"/></feComponentTransfer></filter>
  </defs>
  <rect width="1400" height="2100" fill="url(#bg)"/>
  <rect width="1400" height="2100" fill="url(#glow)"/>
  <rect x="135" y="180" width="1130" height="1740" fill="none" stroke="#f5efe4" stroke-opacity="0.22" stroke-width="2"/>
  <path d="M320 1450c170-270 305-405 405-405 88 0 146 92 220 92 80 0 128-68 225-210" fill="none" stroke="#b9985b" stroke-width="8" stroke-linecap="round" opacity="0.65"/>
  <circle cx="560" cy="700" r="135" fill="#f5efe4" opacity="0.13"/>
  <text x="700" y="1010" text-anchor="middle" fill="#f5efe4" font-family="Georgia, serif" font-size="78" letter-spacing="6">PHOTO</text>
  <text x="700" y="1105" text-anchor="middle" fill="#b9985b" font-family="Arial, sans-serif" font-size="28" letter-spacing="12">PLACEHOLDER</text>
  <rect width="1400" height="2100" filter="url(#grain)" opacity="0.35"/>
</svg>
